<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Legal imprint and privacy information for Nhywyll's website. Company details, contact information, and data privacy policies.">
    <meta name="keywords" content="imprint, legal, privacy, Nhywyll contact, data protection">
    <meta name="author" content="Nhywyll">
    <meta name="robots" content="index, follow">
    <link rel="icon" type="image/x-icon" href="images/For Icon.png">
    <link rel="apple-touch-icon" href="images/For Icon.png">
    <!-- Google Fonts: non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap"></noscript>
    

    <script>
        (function(){
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                document.documentElement.classList.add('light-theme');
            }
            document.documentElement.dataset.theme = savedTheme;
        })();
    </script>
    <title data-i18n="page_title_imprint">page_title_imprint</title>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <header>
        <nav>
            <a href="index.html" class="logo-link">
                <h1 class="visually-hidden" data-i18n="page_title">page_title</h1>
                <img src="images/Logo.webp" alt="Nhywyll Logo" class="logo" loading="eager" width="125" height="125">
            </a>
            <ul>
                <li><a href="index.html" data-i18n="nav_home">nav_home</a></li>
                <li><a href="links.html" data-i18n="nav_links">nav_links</a></li>
                <li><a href="contact.html" data-i18n="nav_contact">nav_contact</a></li>
                <li><a href="credits.html" data-i18n="nav_credits">nav_credits</a></li>
            </ul>
            <div class="nav-actions">
                <div class="language-switcher">
                    <button class="lang-btn active" data-lang="en" aria-label="EN - Switch to English">EN</button>
                    <button class="lang-btn" data-lang="de" aria-label="DE - Switch to German">DE</button>
                </div>
                <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme" title="Toggle between dark and light theme">🌙</button>
                <button id="menu-toggle" class="menu-btn" aria-label="Toggle navigation menu" aria-expanded="false">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </header>

    <main id="main-content" tabindex="-1">
        <div class="imprint-container">
            <h1 data-i18n="imprint_title">imprint_title</h1>

            <section class="imprint-card" id="imprint">
                <h2 data-i18n="imprint_title">imprint_title</h2>
                <div data-i18n-html="imprint_full_text"></div>
            </section>

            <section class="imprint-card" id="privacy">
                <h2 data-i18n="privacy_title">privacy_title</h2>
                <div data-i18n-html="privacy_full_text"></div>
            </section>
        </div>
    </main>
    <button class="back-to-top" aria-label="Back to top" title="Move to top">↑</button>
    <footer>
        &copy; 2026 Nhywyll &middot; All rights reserved | <a href="imprint.html#imprint" data-i18n="imprint_link">imprint_link</a> &middot; <a href="imprint.html#privacy" data-i18n="privacy_link">privacy_link</a>
        <span class="easter-hint-container" aria-hidden="true">
            🐣
            <span class="easter-tooltip" data-i18n="easter_hint">easter_hint</span>
        </span>
    </footer>
    
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
